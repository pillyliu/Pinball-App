<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="2048" viewBox="0 0 1536 2048" role="img" aria-labelledby="title desc">
<title id="title">Score Scan Calibration Chart</title>
<desc id="desc">A portrait calibration chart with isolated number rows for testing score scanner alignment and crop size.</desc>
<rect width="1536" height="2048" fill="#050505"/>
<rect x="72" y="72" width="1392" height="1904" rx="36" fill="#0b0b0b" stroke="#f2f2f2" stroke-width="6"/>

<text x="768" y="182" text-anchor="middle" fill="#ffffff" font-size="56" font-family="Menlo, Consolas, monospace" font-weight="700">
  SCORE SCAN CALIBRATION
</text>
<text x="768" y="238" text-anchor="middle" fill="#b8b8b8" font-size="28" font-family="Menlo, Consolas, monospace">
  Aim the white scanner box at one row at a time. If it reads a neighboring row, the ROI is oversized or shifted.
</text>

<g fill="none" stroke="#2a2a2a" stroke-width="4">
