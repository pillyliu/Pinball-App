name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  android-build:
    name: Android Build + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Pinball App Android
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Build debug APK
        run: ./gradlew :app:assembleDebug
      - name: Run practice migration tests
        run: ./gradlew :app:testDebugUnitTest --tests com.pillyliu.pinprofandroid.practice.PracticeCanonicalPersistenceTest

  ios-build:
    name: iOS Build + Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Resolve iOS simulator
        run: |
          UDID="$(python3 <<'PY'
          import json
          import subprocess
          import sys

          preferred_names = [
              "iPhone 17 Pro",
              "iPhone 17",
              "iPhone 16 Pro",
              "iPhone 16",
              "iPhone 15 Pro",
              "iPhone 15",
              "iPhone 14 Pro",
              "iPhone 14",
          ]

          def load_json(*command):
              return json.loads(subprocess.check_output(command, text=True))

          def runtime_key(identifier):
              suffix = identifier.split("iOS-", 1)[-1]
              return tuple(int(part) for part in suffix.split("-"))

          devices = load_json("xcrun", "simctl", "list", "devices", "available", "-j").get("devices", {})
          runtimes = [
              runtime
              for runtime in load_json("xcrun", "simctl", "list", "runtimes", "available", "-j").get("runtimes", [])
              if runtime.get("isAvailable") and runtime.get("identifier", "").startswith("com.apple.CoreSimulator.SimRuntime.iOS-")
          ]
          runtimes.sort(key=lambda runtime: runtime_key(runtime["identifier"]), reverse=True)

          for runtime in runtimes:
              available_devices = [
                  device
                  for device in devices.get(runtime["identifier"], [])
                  if device.get("isAvailable")
              ]
              for preferred_name in preferred_names:
                  for device in available_devices:
                      if device.get("name") == preferred_name:
                          print(device["udid"])
                          sys.exit(0)
              for device in available_devices:
                  if device.get("name", "").startswith("iPhone"):
                      print(device["udid"])
                      sys.exit(0)

          if not runtimes:
              sys.exit("No available iOS runtimes found.")

          runtime = runtimes[0]
          supported_device_types = {
              device_type["name"]: device_type["identifier"]
              for device_type in runtime.get("supportedDeviceTypes", [])
              if device_type.get("productFamily") == "iPhone"
          }

          chosen_name = None
          chosen_type = None
          for preferred_name in preferred_names:
              if preferred_name in supported_device_types:
                  chosen_name = preferred_name
                  chosen_type = supported_device_types[preferred_name]
                  break

          if chosen_type is None and supported_device_types:
              chosen_name, chosen_type = next(iter(supported_device_types.items()))

          if chosen_type is None:
              sys.exit(f"No supported iPhone simulator device types found for runtime {runtime['identifier']}.")

          simulator_name = f"PinProf CI {chosen_name}"
          udid = subprocess.check_output(
              ["xcrun", "simctl", "create", simulator_name, chosen_type, runtime["identifier"]],
              text=True,
          ).strip()
          print(udid)
          PY
          )"
          if [ -z "${UDID}" ]; then
            echo "Failed to resolve an iOS simulator UDID."
            xcrun simctl list devices available || true
            xcrun simctl list runtimes available || true
            exit 1
          fi
          xcrun simctl boot "${UDID}" || true
          xcrun simctl bootstatus "${UDID}" -b
          echo "IOS_SIMULATOR_DESTINATION=platform=iOS Simulator,id=${UDID}" >> "$GITHUB_ENV"
          echo "IOS_DERIVED_DATA_PATH=${RUNNER_TEMP}/pinprof-derived-data" >> "$GITHUB_ENV"
          echo "Using simulator destination: platform=iOS Simulator,id=${UDID}"
      - name: Build iOS app for testing
        run: |
          cd "Pinball App 2"
          xcodebuild \
            -project "Pinball App 2.xcodeproj" \
            -scheme "PinProf" \
            -sdk iphonesimulator \
            -destination "${IOS_SIMULATOR_DESTINATION}" \
            -derivedDataPath "${IOS_DERIVED_DATA_PATH}" \
            build-for-testing || {
              echo "iOS build-for-testing failed; available destinations:"
              xcodebuild -project "Pinball App 2.xcodeproj" -scheme "PinProf" -showdestinations || true
              xcrun simctl list devices available || true
              exit 1
            }
      - name: Run practice migration tests
        run: |
          cd "Pinball App 2"
          xcodebuild \
            -project "Pinball App 2.xcodeproj" \
            -scheme "PinProf" \
            -sdk iphonesimulator \
            -destination "${IOS_SIMULATOR_DESTINATION}" \
            -derivedDataPath "${IOS_DERIVED_DATA_PATH}" \
            -only-testing:"Pinball App 2Tests/PracticeStateCodecTests" \
            test-without-building || {
              echo "iOS tests failed; available destinations:"
              xcodebuild -project "Pinball App 2.xcodeproj" -scheme "PinProf" -showdestinations || true
              xcrun simctl list devices available || true
              exit 1
            }
